<div class="app-shell">
  <section class="hero" [class.hero--animated]="animationEnabled">
    <h1>{{ appName }}</h1>
    <p>Browse Marvel characters, comics, and series through the public Marvel API.</p>
    <button class="btn btn-danger" type="button" (click)="toggleAnimation()">
      {{ animationEnabled ? 'Stop Intro Style' : 'Play Intro Style' }}
    </button>
  </section>

  <nav class="navbar navbar-expand-lg navbar-light bg-light mt-3 rounded shadow-sm">
    <a class="navbar-brand" routerLink="/">Marvel</a>
    <div class="navbar-nav">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Characters</a>
      <a class="nav-link" routerLink="/comics" routerLinkActive="active">Comics</a>
      <a class="nav-link" routerLink="/series" routerLinkActive="active">Series</a>
    </div>
  </nav>

  <main class="mt-3">
    <router-outlet></router-outlet>
  </main>

  <footer class="mt-4 py-3 text-center text-muted border-top">
    &copy; 2026 Marvel API Explorer
  </footer>
</div>
