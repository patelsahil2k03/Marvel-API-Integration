<div class="container-fluid mt-4">
  <h4>Marvel Comics</h4>
  <p class="text-muted" *ngIf="isLoading">Loading comics...</p>
  <p class="text-danger" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="row">
    <div class="col-lg-3 mt-3 mb-3" *ngFor="let c of allComics">
      <div class="card h-100">
        <img [src]="imageUrl(c.thumbnail.path, c.thumbnail.extension)" class="card-img-top" alt="Comic image" />
        <div class="card-body">
          <h5 class="card-title">{{ c.title }}</h5>
        </div>
      </div>
    </div>
    <div class="col-12" *ngIf="!isLoading && !errorMessage && allComics.length === 0">
      <p class="text-muted">No comics available.</p>
    </div>
  </div>
</div>
